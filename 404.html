<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Pagina non trovata — Gestione Pagine</title>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Titillium Web',system-ui,sans-serif;background:#0D1520;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.box{max-width:520px}
.code{font-size:84px;font-weight:900;color:#4DA6FF;line-height:1}
h1{font-size:26px;font-weight:700;margin:14px 0 10px}
p{color:#9fb3c8;font-size:16px;line-height:1.6;margin-bottom:26px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a{display:inline-block;text-decoration:none;font-weight:700;padding:13px 28px;border-radius:8px}
.primary{background:#0066CC;color:#fff}.secondary{border:1px solid #2C3E50;color:#cdd7df}
</style>
</head>
<body>
<div class="box">
  <div class="code">404</div>
  <h1>Pagina non trovata</h1>
  <p>La pagina che cerchi non esiste o è stata rimossa. Torna alla home o scopri i nostri servizi per la tua attività.</p>
  <div class="btns">
    <a class="primary" href="/">Vai alla home</a>
    <a class="secondary" href="/portali/">I nostri servizi</a>
  </div>
</div>
</body>
</html>
